<!DOCTYPE html> <html> <head> <title>To my❤️</title> <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500;700&display=swap" rel="stylesheet"> <style> body{ font-family:'Dancing Script',cursive; text-align:center; background:linear-gradient(135deg,#ffd6eb,#ffe6f3); overflow-x:hidden; } h1{ margin-top:30px; color:#ff2e8a; font-size:40px; font-style:italic; } /* yes button */ #startBtn{ margin-top:60px; font-size:28px; padding:12px 30px; border:none; border-radius:30px; background:#ff2e8a; color:white; cursor:pointer; box-shadow:0 5px 15px rgba(0,0,0,0.2); transition:0.3s; } #startBtn:hover{ transform:scale(1.1); } /* puzzle */ #puzzle{ width:360px; height:360px; margin:30px auto; display:grid; grid-template-columns:repeat(3,1fr); gap:4px; display:none; } .piece{ width:120px; height:120px; background-size:360px 360px; cursor:pointer; border-radius:10px; transition:all 0.35s ease; } .selected{ transform:scale(0.9); opacity:0.6; } /* final image */ #finalImage{ display:none; width:360px; height:360px; margin:30px auto; border-radius:12px; box-shadow:0 10px 25px rgba(0,0,0,0.25); } #msg{ font-size:34px; color:#ff0066; display:none; margin-top:20px; font-style:italic; animation:fadeIn 1s ease; } @keyframes fadeIn{ from{opacity:0} to{opacity:1} } /* floating hearts */ .heart{ position:fixed; bottom:-20px; font-size:18px; opacity:0.7; animation:float 6s linear infinite; } @keyframes float{ 0%{transform:translateY(0);opacity:0} 20%{opacity:0.8} 100%{transform:translateY(-110vh);opacity:0} } /* heart burst */ .blast{ position:fixed; font-size:24px; animation:burst 2s forwards; } @keyframes burst{ 0%{transform:scale(0.5);opacity:1;} 100%{transform:translateY(-200px) scale(1.6);opacity:0;} } </style> </head> <body> <h1>Will you fix us??🥺</h1> <button id="startBtn">Yes ❤️</button> <div id="puzzle"></div> <img id="finalImage"> <div id="msg">I’m sorry cutie , Love you🥺❤️</div> <script> const puzzle=document.getElementById("puzzle") const startBtn=document.getElementById("startBtn") const finalImage=document.getElementById("finalImage") const imageSrc="yourimage.jpeg" let selected=null /* show puzzle after button click */ startBtn.onclick=()=>{ startBtn.style.display="none" puzzle.style.display="grid" } /* load image */ const img=new Image() img.src=imageSrc img.onload=function(){ let size=Math.min(img.width,img.height) let canvas=document.createElement("canvas") canvas.width=size canvas.height=size let ctx=canvas.getContext("2d") let sx=(img.width-size)/2 let sy=(img.height-size)/2 ctx.drawImage(img,sx,sy,size,size,0,0,size,size) let croppedImage=canvas.toDataURL() createPuzzle(croppedImage) } /* create puzzle */ function createPuzzle(image){ let positions=[] for(let i=0;i<9;i++){ let x=(i%3)*120 let y=Math.floor(i/3)*120 positions.push(${-x}px ${-y}px) } let shuffled=[...positions].sort(()=>Math.random()-0.5) for(let i=0;i<9;i++){ let piece=document.createElement("div") piece.className="piece" piece.dataset.correct=positions[i] piece.style.backgroundImage="url("+image+")" piece.style.backgroundPosition=shuffled[i] puzzle.appendChild(piece) } } /* clicking logic */ puzzle.addEventListener("click",e=>{ if(!e.target.classList.contains("piece")) return if(!selected){ selected=e.target selected.classList.add("selected") }else{ let temp=e.target.style.backgroundPosition e.target.style.backgroundPosition=selected.style.backgroundPosition selected.style.backgroundPosition=temp selected.classList.remove("selected") selected=null checkWin() } }) /* check win */ function checkWin(){ let win=true let children=[...puzzle.children] children.forEach(p=>{ if(p.style.backgroundPosition!==p.dataset.correct) win=false }) if(win){ document.getElementById("msg").style.display="block" puzzle.style.display="none" finalImage.src=imageSrc finalImage.style.display="block" heartBurst() } } /* floating hearts */ function createHeart(){ let heart=document.createElement("div") heart.className="heart" heart.innerHTML="💗" heart.style.left=Math.random()*100+"vw" heart.style.animationDuration=(4+Math.random()*3)+"s" document.body.appendChild(heart) setTimeout(()=>heart.remove(),7000) } setInterval(createHeart,800) /* heart explosion */ function heartBurst(){ for(let i=0;i<25;i++){ let h=document.createElement("div") h.className="blast" h.innerHTML="💖" h.style.left=(window.innerWidth/2+(Math.random()*200-100))+"px" h.style.top=(window.innerHeight/2)+"px" document.body.appendChild(h) setTimeout(()=>h.remove(),2000) } } </script> </body> </html>
