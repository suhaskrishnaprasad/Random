<!DOCTYPE html>
<html>
<head>

<title>To my babyy❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&display=swap" rel="stylesheet">

<style>

body{
font-family:'Dancing Script',cursive;
text-align:center;
background:linear-gradient(135deg,#ffd6eb,#ffe6f3);
overflow-x:hidden;
margin:0;
}

h1{
margin-top:40px;
color:#ff2e8a;
font-size:40px;
font-style:italic;
}

#msg{
font-size:34px;
color:#ff0066;
display:none;
margin-top:20px;
}

button{
font-family:'Dancing Script',cursive;
font-size:28px;
padding:12px 30px;
border:none;
border-radius:30px;
background:#ff4da6;
color:white;
cursor:pointer;
box-shadow:0 5px 10px rgba(0,0,0,0.2);
transition:0.3s;
}

button:hover{
transform:scale(1.1);
}

#startScreen{
margin-top:80px;
}

#game{
display:none;
margin-top:30px;
}

#puzzle{
width:300px;
height:300px;
margin:auto;
display:grid;
grid-template-columns:repeat(3,1fr);
grid-template-rows:repeat(3,1fr);
gap:2px;
}

.piece{
width:100px;
height:100px;
background-image:url('yourimage.jpeg');
background-size:300px 300px;
cursor:pointer;
transition:0.3s;
}

#finalImage{
display:none;
margin:auto;
width:300px;
height:300px;
object-fit:cover;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

.heart{
position:fixed;
bottom:-20px;
font-size:20px;
animation:float 6s linear infinite;
opacity:0.7;
}

@keyframes float{
0%{transform:translateY(0) scale(1);opacity:0.8;}
100%{transform:translateY(-100vh) scale(1.5);opacity:0;}
}

</style>
</head>

<body>

<div id="startScreen">
<p style="font-size:30px;">Will you try to fix it? 🥺</p>
<button onclick="startGame()">Yes ❤️</button>
</div>

<div id="game">

<div id="puzzle"></div>

<img id="finalImage" src="yourimage.jpeg">

<div id="msg">I'm sorry cutie 🥺❤️</div>

</div>

<script>

let puzzle=document.getElementById("puzzle")
let size=3
let pieces=[]

function startGame(){
document.getElementById("startScreen").style.display="none"
document.getElementById("game").style.display="block"
createPuzzle()
}

function createPuzzle(){

for(let y=0;y<size;y++){
for(let x=0;x<size;x++){

let piece=document.createElement("div")
piece.className="piece"

piece.style.backgroundPosition=
`${-x*100}px ${-y*100}px`

piece.dataset.correct=x+","+y
pieces.push(piece)

puzzle.appendChild(piece)

}
}

shuffle()

pieces.forEach(piece=>{
piece.addEventListener("click",()=>selectPiece(piece))
})

}

let first=null

function selectPiece(piece){

if(!first){
first=piece
piece.style.outline="3px solid white"
}
else{

swap(first,piece)
first.style.outline="none"
first=null

checkSolved()

}

}

function swap(a,b){

let temp=a.style.backgroundPosition
a.style.backgroundPosition=b.style.backgroundPosition
b.style.backgroundPosition=temp

}

function shuffle(){

for(let i=0;i<50;i++){

let a=pieces[Math.floor(Math.random()*pieces.length)]
let b=pieces[Math.floor(Math.random()*pieces.length)]

swap(a,b)

}

}

function checkSolved(){

let correct=true

pieces.forEach(piece=>{

let pos=piece.style.backgroundPosition.split(" ")

let x=parseInt(pos[0])/-100
let y=parseInt(pos[1])/-100

if(piece.dataset.correct!=(x+","+y)){
correct=false
}

})

if(correct){

puzzle.style.display="none"
document.getElementById("finalImage").style.display="block"
document.getElementById("msg").style.display="block"

}

}

function createHeart(){

let heart=document.createElement("div")
heart.className="heart"
heart.innerHTML="❤️"

heart.style.left=Math.random()*100+"%"

document.body.appendChild(heart)

setTimeout(()=>heart.remove(),6000)

}

setInterval(createHeart,600)

</script>

</body>
</html>
