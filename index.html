<!DOCTYPE html>
<html>
<head>
<title>Puzzle</title>

<style>

body{
font-family: Arial;
text-align:center;
background:#ffd6eb;
}

h1{
margin-top:30px;
color:#ff2e8a;
}

#puzzle{
width:360px;
height:360px;
margin:30px auto;
display:grid;
grid-template-columns:repeat(3,1fr);
gap:2px;
}

.piece{
width:120px;
height:120px;
background-size:360px;
cursor:pointer;
border:1px solid white;
}

#msg{
font-size:22px;
color:#ff0066;
display:none;
}

</style>
</head>

<body>

<h1>Fix the puzzle 🧩</h1>

<div id="puzzle"></div>

<div id="msg">Puzzle Solved ❤️</div>

<script>

const puzzle = document.getElementById("puzzle")
const image = "yourimage.jpeg"

let pieces=[]

for(let i=0;i<9;i++){

let piece=document.createElement("div")
piece.className="piece"

let x=(i%3)*120
let y=Math.floor(i/3)*120

piece.style.backgroundImage="url("+image+")"
piece.style.backgroundPosition=`-${x}px -${y}px`

pieces.push(piece)

}

pieces.sort(()=>Math.random()-0.5)

pieces.forEach(p=>puzzle.appendChild(p))

let selected=null

puzzle.addEventListener("click",e=>{

if(!e.target.classList.contains("piece")) return

if(!selected){
selected=e.target
selected.style.opacity="0.5"
}
else{

let temp=selected.style.backgroundPosition
selected.style.backgroundPosition=e.target.style.backgroundPosition
e.target.style.backgroundPosition=temp

selected.style.opacity="1"
selected=null

checkWin()

}

})

function checkWin(){

let win=true

let children=[...puzzle.children]

children.forEach((p,i)=>{

let x=(i%3)*120
let y=Math.floor(i/3)*120

if(p.style.backgroundPosition!==`-${x}px -${y}px`)
win=false

})

if(win){
document.getElementById("msg").style.display="block"
}

}

</script>

</body>
</html>
