<!DOCTYPE html>
<html>
<head>
<title>To my cutie❤️</title>

<style>

body{
font-family:Arial;
text-align:center;
background:linear-gradient(135deg,#ffd6eb,#ffe6f3);
overflow-x:hidden;
}

h1{
margin-top:30px;
color:#ff2e8a;
}

#puzzle{
width:360px;
height:360px;
margin:30px auto;
display:grid;
grid-template-columns:repeat(3,1fr);
gap:4px;
}

.piece{
width:120px;
height:120px;
background-size:360px 360px;
cursor:pointer;
border-radius:8px;
transition:all 0.35s ease;
}

.selected{
transform:scale(0.9);
opacity:0.6;
}

#msg{
font-size:28px;
color:#ff0066;
display:none;
margin-top:20px;
animation:fadeIn 1s ease;
}

@keyframes fadeIn{
from{opacity:0}
to{opacity:1}
}

/* floating hearts */

.heart{
position:fixed;
bottom:-20px;
font-size:18px;
opacity:0.7;
animation:float 6s linear infinite;
}

@keyframes float{
0%{transform:translateY(0);opacity:0}
20%{opacity:0.8}
100%{transform:translateY(-110vh);opacity:0}
}

/* heart burst */

.blast{
position:fixed;
font-size:24px;
animation:burst 2s forwards;
}

@keyframes burst{
0%{
transform:scale(0.5);
opacity:1;
}
100%{
transform:translateY(-200px) scale(1.6);
opacity:0;
}
}

</style>
</head>

<body>

<h1>Fix it please🥺</h1>

<div id="puzzle"></div>

<div id="msg">I’m sorry cutie 🥺❤️</div>

<script>

const puzzle=document.getElementById("puzzle")
const imageSrc="yourimage.jpeg"

let selected=null

/* load image */

const img=new Image()
img.src=imageSrc

img.onload=function(){

let size=Math.min(img.width,img.height)

let canvas=document.createElement("canvas")
canvas.width=size
canvas.height=size

let ctx=canvas.getContext("2d")

let sx=(img.width-size)/2
let sy=(img.height-size)/2

ctx.drawImage(img,sx,sy,size,size,0,0,size,size)

let croppedImage=canvas.toDataURL()

createPuzzle(croppedImage)

}

/* create puzzle */

function createPuzzle(image){

let positions=[]

for(let i=0;i<9;i++){

let x=(i%3)*120
let y=Math.floor(i/3)*120

positions.push(`${-x}px ${-y}px`)

}

let shuffled=[...positions].sort(()=>Math.random()-0.5)

for(let i=0;i<9;i++){

let piece=document.createElement("div")
piece.className="piece"

piece.dataset.correct=positions[i]

piece.style.backgroundImage="url("+image+")"
piece.style.backgroundPosition=shuffled[i]

puzzle.appendChild(piece)

}

}

/* click swap */

puzzle.addEventListener("click",e=>{

if(!e.target.classList.contains("piece")) return

if(!selected){

selected=e.target
selected.classList.add("selected")

}else{

let temp=e.target.style.backgroundPosition

e.target.style.backgroundPosition=selected.style.backgroundPosition
selected.style.backgroundPosition=temp

selected.classList.remove("selected")
selected=null

checkWin()

}

})

/* check win */

function checkWin(){

let win=true

let children=[...puzzle.children]

children.forEach(p=>{

if(p.style.backgroundPosition!==p.dataset.correct)
win=false

})

if(win){

document.getElementById("msg").style.display="block"

puzzle.style.transition="0.8s"
puzzle.style.opacity="0.2"

heartBurst()

}

}

/* floating hearts */

function createHeart(){

let heart=document.createElement("div")
heart.className="heart"
heart.innerHTML="💗"

heart.style.left=Math.random()*100+"vw"
heart.style.animationDuration=(4+Math.random()*3)+"s"

document.body.appendChild(heart)

setTimeout(()=>heart.remove(),7000)

}

setInterval(createHeart,800)

/* heart explosion */

function heartBurst(){

for(let i=0;i<25;i++){

let h=document.createElement("div")
h.className="blast"
h.innerHTML="💖"

h.style.left=(window.innerWidth/2+(Math.random()*200-100))+"px"
h.style.top=(window.innerHeight/2)+"px"

document.body.appendChild(h)

setTimeout(()=>h.remove(),2000)

}

}

</script>

</body>
</html>
