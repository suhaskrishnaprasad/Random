<!DOCTYPE html>
<html>
<head>
<title>Puzzle</title>

<style>

body{
font-family: Arial;
text-align:center;
background:#ffd6eb;
}

h1{
margin-top:30px;
color:#ff2e8a;
}

#puzzle{
width:360px;
height:360px;
margin:30px auto;
display:grid;
grid-template-columns:repeat(3,1fr);
gap:3px;
}

.piece{
width:120px;
height:120px;
background-size:360px 360px;
cursor:pointer;
border:1px solid white;
}

#msg{
font-size:22px;
color:#ff0066;
display:none;
}

</style>
</head>

<body>

<h1>Fix the puzzle 🧩</h1>

<div id="puzzle"></div>

<div id="msg">Puzzle Solved ❤️</div>

<script>

const puzzle = document.getElementById("puzzle")
const imageSrc = "yourimage.jpeg"

let selected = null

const img = new Image()
img.src = imageSrc

img.onload = function(){

let size = Math.min(img.width, img.height)

let canvas = document.createElement("canvas")
canvas.width = size
canvas.height = size

let ctx = canvas.getContext("2d")

let sx = (img.width - size)/2
let sy = (img.height - size)/2

ctx.drawImage(img, sx, sy, size, size, 0, 0, size, size)

let croppedImage = canvas.toDataURL()

createPuzzle(croppedImage)

}

function createPuzzle(image){

let positions=[]

for(let i=0;i<9;i++){

let x=(i%3)*120
let y=Math.floor(i/3)*120

positions.push({x,y})

}

let shuffled=[...positions].sort(()=>Math.random()-0.5)

for(let i=0;i<9;i++){

let piece=document.createElement("div")
piece.className="piece"

piece.dataset.correctX = positions[i].x
piece.dataset.correctY = positions[i].y

piece.style.backgroundImage="url("+image+")"
piece.style.backgroundPosition=`-${shuffled[i].x}px -${shuffled[i].y}px`

puzzle.appendChild(piece)

}

}

puzzle.addEventListener("click",e=>{

if(!e.target.classList.contains("piece")) return

if(!selected){

selected=e.target
selected.style.opacity="0.5"

}else{

let temp=e.target.style.backgroundPosition
e.target.style.backgroundPosition=selected.style.backgroundPosition
selected.style.backgroundPosition=temp

selected.style.opacity="1"
selected=null

checkWin()

}

})

function checkWin(){

let win=true

let children=[...puzzle.children]

children.forEach((p,i)=>{

let x=(i%3)*120
let y=Math.floor(i/3)*120

if(p.style.backgroundPosition!==`-${x}px -${y}px`)
win=false

})

if(win){
document.getElementById("msg").style.display="block"
}

}

</script>

</body>
</html>
