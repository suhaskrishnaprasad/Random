<!DOCTYPE html>
<html>

<head>

<title>To my baby</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&display=swap" rel="stylesheet">

<style>

body{
font-family:'Dancing Script',cursive;
text-align:center;
background:#e6c3d5;
margin:0;
}

h1{
margin-top:40px;
color:#ff2e8a;
font-size:42px;
}

button{
font-family:'Dancing Script',cursive;
font-size:28px;
padding:12px 30px;
border:none;
border-radius:30px;
background:#ff4da6;
color:white;
cursor:pointer;
margin-top:40px;
}

#puzzle{
width:330px;
margin:auto;
display:grid;
grid-template-columns:repeat(3,110px);
grid-template-rows:repeat(3,110px);
gap:6px;
}

.piece{
width:110px;
height:110px;
background-image:url('yourimage.jpeg');
background-size:330px 330px;
border-radius:15px;
cursor:pointer;
}

#finalImage{
display:none;
width:330px;
height:330px;
object-fit:cover;
border-radius:20px;
margin:auto;
}

#msg{
font-size:40px;
color:#ff0066;
margin-top:30px;
display:none;
}

.emoji{
font-family:initial;
font-style:normal;
}

</style>
</head>

<body>

<h1>Fix the puzzle <span class="emoji">🧩</span></h1>

<div id="start">
<button onclick="startGame()">Yes <span class="emoji">❤️</span></button>
</div>

<div id="game" style="display:none">

<div id="puzzle"></div>

<img id="finalImage" src="yourimage.jpeg">

<div id="msg">
I'm sorry . Love you <span class="emoji">🥺❤️</span>
</div>

</div>

<script>

let puzzle=document.getElementById("puzzle")
let size=3
let pieces=[]
let first=null

function startGame(){
document.getElementById("start").style.display="none"
document.getElementById("game").style.display="block"
createPuzzle()
}

function createPuzzle(){

for(let y=0;y<size;y++){
for(let x=0;x<size;x++){

let piece=document.createElement("div")

piece.className="piece"

piece.style.backgroundPosition=`${-x*110}px ${-y*110}px`

piece.dataset.correct=x+","+y

pieces.push(piece)

puzzle.appendChild(piece)

piece.onclick=()=>select(piece)

}
}

shuffle()

}

function select(piece){

if(!first){
first=piece
piece.style.outline="3px solid white"
}else{

swap(first,piece)

first.style.outline="none"

first=null

check()

}

}

function swap(a,b){

let temp=a.style.backgroundPosition
a.style.backgroundPosition=b.style.backgroundPosition
b.style.backgroundPosition=temp

}

function shuffle(){

for(let i=0;i<40;i++){

let a=pieces[Math.floor(Math.random()*pieces.length)]
let b=pieces[Math.floor(Math.random()*pieces.length)]

swap(a,b)

}

}

function check(){

let correct=true

pieces.forEach(p=>{

let pos=p.style.backgroundPosition.split(" ")

let x=parseInt(pos[0])/-110
let y=parseInt(pos[1])/-110

if(p.dataset.correct!=(x+","+y)) correct=false

})

if(correct){

puzzle.style.display="none"

document.getElementById("finalImage").style.display="block"

document.getElementById("msg").style.display="block"

}

}

</script>

</body>
</html>
